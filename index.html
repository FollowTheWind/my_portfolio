<body>

  <header class="site-header" id="header">
    <div class="container header-inner">
      <a href="#" class="logo">彭星</a>
      <nav class="main-nav" id="mainNav">
        <a href="#works" class="nav-link">作品</a>
        <a href="#about" class="nav-link">关于</a>
        <a href="#contact" class="nav-link">联系</a>

        <span></span>
        <span></span>
        <span></span>

  <main>
    <section class="hero" id="hero">
      <div class="hero-bg"></div>
      <div class="hero-content">
        <h1 class="hero-title">彭星</h1>

      </div>
      <a href="#works" class="scroll-down" aria-label="向下滚动">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="6 9 12 15 18 9"></polyline>
        </svg>

    </section>

    <section class="works" id="works">
      <div class="container">
        <h2 class="section-title">作品</h2>
        <div class="works-grid" id="worksGrid"></div>
      </div>
    </section>

    <section class="about" id="about">
      <div class="container about-inner">
        <div class="about-photo">
          <img src="assets/images/avatar.jpg" alt="彭星个人照片" loading="lazy">

        <div class="about-text">
          <h2 class="section-title">关于我</h2>
          <p>我是彭星，一名文案策划从业者，同时也热爱摄影与短视频创作。我相信好的内容需要视觉与文字的共鸣，而每一次快门和剪辑都是在讲述独特的故事。</p>
          <p>从商业摄影到短视频剪辑，从品牌文案到创意策划，我致力于用专业的技能和独特的视角，为每一个项目注入灵魂。无论是企业宣传、个人IP打造，还是产品展示，我都期待与你一起创造令人印象深刻的作品。</p>
          <div class="about-tags">
            <span class="tag">商业摄影</span>
            <span class="tag">短视频剪辑</span>
            <span class="tag">文案策划</span>
          </div>
        </div>
      </div>
    </section>

    <section class="contact" id="contact">
      <div class="container contact-inner">
        <h2 class="section-title">联系方式</h2>
        <p class="contact-invite">期待与你合作，让创意发声</p>
        <a href="tel:+8613800138000" class="contact-phone">138-0013-8000</a>
      </div>

  <footer class="site-footer">

  <div class="lightbox" id="lightbox">

    <div class="lightbox-content">
      <img src="" alt="" id="lightboxImg">

  <div class="video-modal" id="videoModal">
    <button class="video-modal-close" aria-label="关闭">&times;</button>
    <div class="video-modal-content">
      <video controls id="modalVideo" playsinline></video>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.2/Sortable.min.js"></script>
